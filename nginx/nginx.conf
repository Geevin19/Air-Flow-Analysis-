events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # ── Required for WebSocket upgrade ───────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend_api {
        server airflow-backend:8000;
    }

    upstream frontend_app {
        server airflow-frontend:80;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name airflowanalysis.xyz www.airflowanalysis.xyz;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name airflowanalysis.xyz www.airflowanalysis.xyz;

        ssl_certificate     /etc/letsencrypt/live/airflowanalysis.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/airflowanalysis.xyz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 10M;

        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;

        # ── WebSocket (/ws/iot) — MUST be before /api/ ───────────────────────
        location /ws/ {
            proxy_pass          http://backend_api;
            proxy_http_version  1.1;

            # These two lines are the critical WebSocket upgrade headers
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        $connection_upgrade;

            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;

            # Keep WebSocket alive — no timeout
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── Backend API (strips /api prefix) ─────────────────────────────────
        location /api/ {
            # Handle CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      "$http_origin"                        always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS"     always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept" always;
                add_header Access-Control-Allow-Credentials "true"                                always;
                add_header Content-Length 0;
                add_header Content-Type   text/plain;
                return 204;
            }

            proxy_pass          http://backend_api/;
            proxy_http_version  1.1;
            proxy_set_header    Authorization     $http_authorization;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Connection        "";
            proxy_pass_header   Authorization;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass          http://frontend_app/;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Connection        "";
        }
    }
}

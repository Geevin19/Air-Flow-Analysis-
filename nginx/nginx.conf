events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    upstream backend_api {
        server airflow-backend:8000;
    }

    upstream frontend_app {
        server airflow-frontend:80;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name airflowanalysis.xyz www.airflowanalysis.xyz;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name airflowanalysis.xyz www.airflowanalysis.xyz;

        ssl_certificate     /etc/letsencrypt/live/airflowanalysis.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/airflowanalysis.xyz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 10M;

        add_header X-Frame-Options    "SAMEORIGIN"  always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection   "1; mode=block" always;

        # ── WebSocket — must come BEFORE the /api/ block ──────────────────────
        location /ws/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;   # keep WS alive
        }

        # ── Backend API (strips /api prefix) ──────────────────────────────────
        location /api/ {
            proxy_pass         http://backend_api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Frontend (SPA catch-all) ───────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_app/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }
    }
}

# ═══════════════════════════════════════════════════════════════════════════
# Nginx Configuration for VM (NOT Docker)
# Place at: /etc/nginx/sites-available/airflow
# ═══════════════════════════════════════════════════════════════════════════

upstream frontend_app {
    server localhost:3000;
}

upstream backend_api {
    server localhost:8000;
}

server {
    listen 80;
    server_name airflowanalysis.xyz www.airflowanalysis.xyz;

    # Logging
    access_log /var/log/nginx/airflow_access.log;
    error_log /var/log/nginx/airflow_error.log;

    # Client body size limit
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # API routes - proxy to backend container
    location /api/ {
        proxy_pass http://backend_api/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://backend_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        proxy_read_timeout 86400;
    }

    # Frontend - proxy to frontend container
    location / {
        proxy_pass http://frontend_app/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

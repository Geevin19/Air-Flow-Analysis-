version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-airflowdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airflow-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-strongpassword123}@postgres:5432/${POSTGRES_DB:-airflowdb}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ALLOWED_ORIGINS: "https://airflowanalysis.xyz,https://www.airflowanalysis.xyz"
      MAIL_USERNAME: ${MAIL_USERNAME:-geevinrv19@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-ajyxagossubtrdsq}
      MAIL_FROM: ${MAIL_FROM:-geevinrv19@gmail.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-geevinr18@gmail.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    # Do NOT expose 8000 publicly — nginx is the only entry point
    expose:
      - "8000"
    networks:
      - airflow_network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # /api is the nginx-proxied path — no hardcoded domain needed
        VITE_API_URL: /api
    container_name: airflow-frontend
    restart: always
    expose:
      - "80"
    networks:
      - airflow_network

  nginx:
    image: nginx:alpine
    container_name: airflow-nginx
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - airflow_network

networks:
  airflow_network:
    driver: bridge

volumes:
  postgres_data:

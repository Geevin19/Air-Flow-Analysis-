# ── Production Docker Compose - Backend + Database Only ──────────────────────

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: airflowdb
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airflow-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://airflow:strongpassword123@db:5432/airflowdb
      SECRET_KEY: auto-generated-secret-key-change-in-production-min-32-chars-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ALLOWED_ORIGINS: "*"
      MAIL_USERNAME: noreply@example.com
      MAIL_PASSWORD: dummy-password
      MAIL_FROM: noreply@example.com
      ADMIN_EMAIL: admin@example.com
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - airflow_network

volumes:
  postgres_data:
    driver: local

networks:
  airflow_network:
    driver: bridge

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: airflowdb
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - airflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airflow-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://airflow:strongpassword123@postgres:5432/airflowdb
      SECRET_KEY: auto-generated-secret-key-change-in-production-min-32-chars-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ALLOWED_ORIGINS: "*"
      MAIL_USERNAME: noreply@example.com
      MAIL_PASSWORD: dummy-password
      MAIL_FROM: noreply@example.com
      ADMIN_EMAIL: admin@example.com
    ports:
      - "8000:8000"
    networks:
      - airflow_network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: airflow-frontend
    restart: always
    ports:
      - "3000:80"
    networks:
      - airflow_network

volumes:
  postgres_data:
    driver: local

networks:
  airflow_network:
    driver: bridge
